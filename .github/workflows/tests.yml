name: Tests

on:
  push:
    branches: master
  pull_request:
    branches: master
  workflow_dispatch:
  workflow_call:

jobs:
  eslint:
    name: ESLint

    runs-on: ubuntu-latest

    steps:
    - name: Check out the source code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22

    - name: Install dependencies
      run: npm ci --omit=peer

    - name: Install peer dependencies
      run: npm install @playwright/test @wordpress/e2e-test-utils-playwright

    - name: Run ESLint
      run: npm run lint:js

  smoke:
    name: Smoke test

    runs-on: ubuntu-latest

    steps:
    - name: Check out the source code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22

    - name: Install dependencies
      run: npm ci --omit=peer

    - name: Install peer dependencies
      run: npm install @playwright/test @wordpress/e2e-test-utils-playwright

    - name: Build package
      run: npm run build

    - name: Verify package entry point
      run: node -e "require('@wpsyntex/e2e-test-utils')"
